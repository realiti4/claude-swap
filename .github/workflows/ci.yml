name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # uv (not pip) so the PEP 735 dev dependency-group — pytest,
      # pytest-asyncio — installs from the committed lockfile, same as local
      # development.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        # Includes the TUI tests: the Textual TUI (unlike the old curses one)
        # runs on stock Windows, and this job is the proof.
        run: uv run pytest

  macos-menubar:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install menu-bar dependencies
        run: uv sync --extra menubar --locked

      - name: Verify native AppKit runtime
        run: uv run python -c "import AppKit; print(AppKit.__file__)"

      - name: Run native menu-bar smoke and pure tests
        # conftest.py replaces Keychain and keyring access with in-memory fakes,
        # so these run without credentials or a real Claude login.
        run: uv run pytest tests/test_menubar_appkit.py tests/test_menubar.py tests/test_menubar_viewmodel.py tests/test_menubar_controller.py

  macos-keychain:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Run macOS Keychain tests (contract + real security wrapper)
        # faulthandler dumps every thread's stack if a test exceeds 60s — a
        # `security` call blocking on an invisible SecurityAgent dialog would
        # otherwise hang the job with no clue where. The step timeout is the
        # backstop that actually kills it.
        timeout-minutes: 5
        run: uv run pytest tests/test_macos_keychain_contract.py tests/test_macos_keychain.py -v -o faulthandler_timeout=60
